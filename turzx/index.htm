<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Две страницы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        iframe {
            flex: 1;
            border: none;
        }
        iframe:first-child {
            border-right: 2px solid #ccc;
        }
    </style>
</head>
<body>
    <iframe src="http://192.168.1.89:4848/Chat/Default/" title="Левая страница"></iframe>
    <iframe src="https://quadplay.ru/twitch" title="Правая страница"></iframe>
</body>
</html>
