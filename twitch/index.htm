<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            width: 300px;
        }
        iframe {
            border: 0;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <iframe
            src="https://player.twitch.tv/?channel=shnumi&parent=quadplay.ru&autoplay=true"
            height="225"
            width="300"
            allowfullscreen
        ></iframe>
    </div>
</body>
</html>
