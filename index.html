<!DOCTYPE html>

<html class="theme-auto" lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QuadPlay</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png">
    <meta name="description" content="Канал адаптивного гейминга QuadPlay">
    <meta name="keywords" content="Stream, Стрим, Twitch, YouTube, VK Video Live, Steam, Игры, Видеоигры, Gaming, Гейминг, ПК, PC, QuadStick, Джойстик, Контроллер, Геймпад, Эмуляция, Adaptive Gaming, Адаптивный Гейминг, Инвалидность, Доступность, МДД, СМА, БАС, ДЦП">

    <meta rel="canonical" href="https://quadplay.ru">

    <meta name="QuadPlay" content="QuadPlay">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
	
	<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="QuadPlay" />
    <link rel="manifest" href="/site.webmanifest" />

  </head>

<body>

    <style>
        body {
            background-image: url('images/Fon.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }
    </style>

    <div class="container">
        <div class="column">

            <img class="avatar avatar--none" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="QuadPlay">

            <h1>
              <div>QuadPlay</div>
            </h1>

            <p>Канал адаптивного гейминга<br>Канал скоро запустится!</p>

            <div class="button-stack" role="navigation">

              <!-- Twitch -->
              <a class="button button-twitch" href="https://twitch.tv/quadplayru" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/twitch.svg" alt="Twitch">Twitch</a>

              <!-- YouTube -->
              <a class="button button-yt-alt" href="https://youtube.com/@quadplay" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube-alt.svg" alt="YouTube">YouTube</a>

              <!-- Telegram -->
              <a class="button button-telegram" href="https://t.me/quadplay" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/telegram.svg" alt="Telegram">Telegram</a>

              <!-- DonationAlerts -->
              <a class="button button-donationalerts" href="https://donationalerts.com/r/quadplay" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/donationalerts.svg" alt="DonationAlerts">DonationAlerts</a>
			  
              <!-- Boosty -->
              <a class="button button-boosty" href="https://boosty.to/quadplay" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/boosty.svg" alt="Boosty">Boosty</a>

              <!-- Steam Alt -->
              <a class="button button-steam-alt" href="https://steamcommunity.com/groups/qdpl" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/steam.svg" alt="Steam">Steam</a>

              <!-- Games Tracking -->
              <a class="button button-vkvideo" href="https://docs.google.com/spreadsheets/d/1Xr40jOKbo7o1qZA0S2m6smAHGHTpVRYG-T-V-U4zgoY" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/gamepad.svg" alt="Трекинг игр">Трекинг игр</a>
			  
              <!-- QuadStick -->
              <a class="button button-contact" href="https://avenom.ru/posts/quadstick" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/quadstick.svg" alt="Обзор QuadStick">Обзор QuadStick</a>

      </div>
    </div>
  </div>
