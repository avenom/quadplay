  <script>
    const iframe = document.getElementById('streamPlayer');
    const buttons = document.querySelectorAll('.controls button');

    const sources = {
      twitch: 'https://player.twitch.tv/?channel=quadplayru&parent=quadplay.ru&muted=true',
      vk: 'https://live.vkvideo.ru/app/embed/quadplay?autoplay=true',
      youtube: 'https://www.youtube.com/embed/live_stream?channel=UCLvQKvtL-LErJMVjzrGvH-w&autoplay=1&mute=0'
    };

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        iframe.src = sources[btn.dataset.player];
      });
    });
  </script>

<script>
function getNext19() {
  const now = new Date();
  
  
  const utcOffset = 3; 
  const nowUtc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const nowInGMT3 = new Date(nowUtc + (utcOffset * 3600000));
  
  const target = new Date(nowInGMT3);
  target.setHours(19, 0, 0, 0);

  
  if (nowInGMT3 >= target) {
    target.setDate(target.getDate() + 1);
  }

  
  const targetUtc = target.getTime() - (utcOffset * 3600000);
  const targetLocal = new Date(targetUtc - (now.getTimezoneOffset() * 60000));

  return targetLocal;
}

function updateCountdown() {
  const now = new Date();
  const target = getNext19();
  const diff = target - now;

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("countdown").textContent =
    `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
