  <script>
    const iframe = document.getElementById('streamPlayer');
    const placeholder = document.getElementById('youtubePlaceholder');
    const buttons = document.querySelectorAll('.controls button');

    const sources = {
      twitch: 'https://player.twitch.tv/?channel=quadplayru&parent=quadplay.ru&autoplay=true&muted=true',
      vk: 'https://live.vkvideo.ru/app/embed/quadplay?autoplay=true',
      youtube: 'https://www.youtube.com/embed/live_stream?channel=UCLvQKvtL-LErJMVjzrGvH-w&autoplay=1&mute=0'
    };

    const youtubeChannelId = 'UCLvQKvtL-LErJMVjzrGvH-w';
    let currentPlayer = 'twitch';
    let youtubeLiveCached = null;

    async function checkYoutubeLiveStatus() {
      if (youtubeLiveCached !== null) {
        return youtubeLiveCached;
      }
      try {
        
        const [res1, res2] = await Promise.all([
          fetch(`https://decapi.me/youtube/latest_video?id=${youtubeChannelId}`),
          fetch(`https://decapi.me/youtube/latest_video?id=${youtubeChannelId}&no_livestream=1`)
        ]);
        
        if (res1.ok && res2.ok) {
          const text1 = await res1.text();
          const text2 = await res2.text();
          
          if (text1 && text2) {
            const isLive = text1.trim() !== text2.trim();
            youtubeLiveCached = isLive;
            
            setTimeout(() => { youtubeLiveCached = null; }, 3 * 60 * 1000);
            return isLive;
          }
        }
      } catch (e) {
        console.warn("DecAPI check failed, falling back to proxy check", e);
      }

      
      try {
        const url = `https://www.youtube.com/channel/${youtubeChannelId}/live`;
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
        if (response.ok) {
          const data = await response.json();
          const html = data.contents;
          
          const isLive = html.includes('"isLive":true') || 
                         html.includes('hqdefault_live.jpg') || 
                         html.includes('{"text":" watching"}') || 
                         html.includes('{"text":" watching now"}') ||
                         html.includes('watching-info') ||
                         html.includes('live-status-indicator');
          
          youtubeLiveCached = isLive;
          setTimeout(() => { youtubeLiveCached = null; }, 3 * 60 * 1000);
          return isLive;
        }
      } catch (e) {
        console.error("Fallback YouTube check failed:", e);
      }
      
      return false;
    }

    async function switchPlayer(playerType) {
      currentPlayer = playerType;
      
      placeholder.style.display = 'none';
      iframe.style.display = 'block';

      if (playerType === 'youtube') {
        placeholder.style.display = 'flex';
        iframe.style.display = 'none';
        iframe.src = 'about:blank';

        const isLive = await checkYoutubeLiveStatus();
        
        if (currentPlayer === 'youtube') {
          if (isLive) {
            placeholder.style.display = 'none';
            iframe.style.display = 'block';
            iframe.src = sources.youtube;
          } else {
            placeholder.style.display = 'flex';
            iframe.style.display = 'none';
            iframe.src = 'about:blank';
          }
        }
      } else {
        iframe.src = sources[playerType];
      }
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        switchPlayer(btn.dataset.player);
      });
    });
  </script>
