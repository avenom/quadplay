<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой Twitch</title>
  <style>
    .twitch-container {
      position: relative;
      width: 100%;
      max-width: 1280px;
      height: 720px;
      margin: 20px auto;
    }
  </style>
</head>
<body>

  <div class="twitch-container">
    <iframe
      src="https://player.twitch.tv/?channel=orkpod&parent=quadplay.ru&autoplay=true&muted=true"
      height="100%"
      width="100%"
      frameborder="0"
      scrolling="no"
      allowfullscreen>
    ></iframe>
  </div>

</body>
</html>
